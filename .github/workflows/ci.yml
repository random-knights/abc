name: CI

on:
  workflow_dispatch:
  # NO paths filter on purpose: this job produces the "CI Gate" required
  # status check (org ruleset ci-gate-required). A required check must run
  # on every PR to main, or a PR that doesn't touch the filtered paths (e.g.
  # a workflow-only PR like the gitleaks secret-scan add) leaves the check
  # permanently pending and GitHub refuses to merge. Unlike a path-scoped,
  # non-required validation (which can safely stay pending on unrelated
  # PRs), the required gate always runs and always concludes.
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - chore/**
      - feature/**

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  classroom-validation:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Verify required classroom docs
        shell: bash
        run: |
          test -s README.md
          test -s lessons/intro.md
          test -s lessons/render-media-composition.md
          test -s labs/sandbox.md
          test -s labs/render-media-composition.md
          for id in 01 02 03 04 05 06 07 08 09 10; do
            test -s lessons/${id}-*.md
            test -s labs/${id}-*.md
          done
          test -s .gitignore

      - name: Verify FFmpeg boundary
        shell: bash
        run: |
          if find . -type f \( -iname "ffmpeg.exe" -o -iname "ffprobe.exe" \) | grep -q .; then
            echo "Do not commit FFmpeg binaries to the classroom repo."
            exit 1
          fi

      - name: Verify generated media boundary
        shell: bash
        run: |
          if find . -type f \( -iname "*.mp4" -o -iname "*.mov" -o -iname "*.mkv" -o -iname "*.avi" \) | grep -q .; then
            echo "Do not commit generated video outputs to the classroom repo."
            exit 1
          fi

      - name: Check markdown files are non-empty
        shell: bash
        run: |
          while IFS= read -r file; do
            test -s "$file"
          done < <(find . -path ./.git -prune -o -type f -name "*.md" -print)

      - name: Inventory classroom scripts
        shell: bash
        run: |
          if [ -d assets ]; then
            find assets -type f \( -iname "*.bat" -o -iname "*.ps1" -o -iname "*.py" \) -print
          else
            echo "No classroom assets directory committed."
          fi
